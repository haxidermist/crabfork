name: Crabfork
options:
  bundleIdPrefix: ai.crabfork
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

packages:
  CrabforkKit:
    path: ../shared/CrabforkKit
  Swabble:
    path: ../../Swabble

schemes:
  Crabfork:
    shared: true
    build:
      targets:
        Crabfork: all
    test:
      targets:
        - CrabforkTests
        - CrabforkLogicTests
  CrabforkLogicTests:
    shared: true
    build:
      targets:
        CrabforkLogicTests: all
    test:
      targets:
        - CrabforkLogicTests

targets:
  Crabfork:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
    dependencies:
      - target: CrabforkShareExtension
        embed: true
      - target: CrabforkActivityWidget
        embed: true
      - target: CrabforkWatchApp
      - package: CrabforkKit
      - package: CrabforkKit
        product: CrabforkChatUI
      - package: CrabforkKit
        product: CrabforkProtocol
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    preBuildScripts:
      - name: SwiftFormat (lint)
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftformat >/dev/null 2>&1; then
            echo "error: swiftformat not found (brew install swiftformat)" >&2
            exit 1
          fi
          swiftformat --lint --config "$SRCROOT/../../.swiftformat" \
            --filelist "$SRCROOT/SwiftSources.input.xcfilelist"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: swiftlint not found (brew install swiftlint)" >&2
            exit 1
          fi
          swiftlint lint --config "$SRCROOT/.swiftlint.yml" --use-script-input-file-lists
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: Sources/Crabfork.entitlements
        CODE_SIGN_STYLE: "$(CRABFORK_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(CRABFORK_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(CRABFORK_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(CRABFORK_APP_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
      configs:
        Debug:
          CRABFORK_PUSH_TRANSPORT: direct
          CRABFORK_PUSH_DISTRIBUTION: local
          CRABFORK_PUSH_RELAY_BASE_URL: ""
          CRABFORK_PUSH_APNS_ENVIRONMENT: sandbox
        Release:
          CRABFORK_PUSH_TRANSPORT: direct
          CRABFORK_PUSH_DISTRIBUTION: local
          CRABFORK_PUSH_RELAY_BASE_URL: ""
          CRABFORK_PUSH_APNS_ENVIRONMENT: production
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Crabfork
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: ai.crabfork.ios
            CFBundleURLSchemes:
              - crabfork
        CFBundleShortVersionString: "$(CRABFORK_MARKETING_VERSION)"
        CrabforkCanonicalVersion: "$(CRABFORK_IOS_VERSION)"
        CFBundleVersion: "$(CRABFORK_BUILD_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - ai.crabfork.ios.bgrefresh
        NSLocalNetworkUsageDescription: Crabfork discovers and connects to your Crabfork gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
        NSBonjourServices:
          - _crabfork-gw._tcp
        NSCameraUsageDescription: Crabfork can capture photos or short video clips when requested via the gateway.
        NSLocationWhenInUseUsageDescription: Crabfork uses your location when you allow location sharing.
        NSLocationAlwaysAndWhenInUseUsageDescription: Crabfork can share your location in the background when you enable Always.
        NSMicrophoneUsageDescription: Crabfork needs microphone access for voice wake.
        NSMotionUsageDescription: Crabfork may use motion data to support device-aware interactions and automations.
        NSPhotoLibraryUsageDescription: Crabfork needs photo library access when you choose existing photos to share with your assistant.
        NSSpeechRecognitionUsageDescription: Crabfork uses on-device speech recognition for voice wake.
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        CrabforkPushTransport: "$(CRABFORK_PUSH_TRANSPORT)"
        CrabforkPushDistribution: "$(CRABFORK_PUSH_DISTRIBUTION)"
        CrabforkPushRelayBaseURL: "$(CRABFORK_PUSH_RELAY_BASE_URL)"
        CrabforkPushAPNsEnvironment: "$(CRABFORK_PUSH_APNS_ENVIRONMENT)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  CrabforkShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ShareExtension
    dependencies:
      - package: CrabforkKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(CRABFORK_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(CRABFORK_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(CRABFORK_SHARE_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(CRABFORK_SHARE_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Crabfork Share
        CFBundleShortVersionString: "$(CRABFORK_MARKETING_VERSION)"
        CFBundleVersion: "$(CRABFORK_BUILD_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1

  CrabforkActivityWidget:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ActivityWidget
      - path: Sources/LiveActivity/CrabforkActivityAttributes.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(CRABFORK_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(CRABFORK_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(CRABFORK_ACTIVITY_WIDGET_BUNDLE_ID)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
    info:
      path: ActivityWidget/Info.plist
      properties:
        CFBundleDisplayName: Crabfork Activity
        CFBundleShortVersionString: "$(CRABFORK_MARKETING_VERSION)"
        CFBundleVersion: "$(CRABFORK_BUILD_VERSION)"
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  CrabforkWatchApp:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
    dependencies:
      - target: CrabforkWatchExtension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    attributes:
      DevelopmentTeam: "$(CRABFORK_DEVELOPMENT_TEAM)"
      ProvisioningStyle: "$(CRABFORK_CODE_SIGN_STYLE)"
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(CRABFORK_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(CRABFORK_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(CRABFORK_WATCH_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(CRABFORK_WATCH_APP_PROFILE)"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: Crabfork
        CFBundleShortVersionString: "$(CRABFORK_MARKETING_VERSION)"
        CFBundleVersion: "$(CRABFORK_BUILD_VERSION)"
        WKCompanionAppBundleIdentifier: "$(CRABFORK_APP_BUNDLE_ID)"
        WKWatchKitApp: true

  CrabforkWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchExtension/Sources
    dependencies:
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
      - sdk: UserNotifications.framework
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    attributes:
      DevelopmentTeam: "$(CRABFORK_DEVELOPMENT_TEAM)"
      ProvisioningStyle: "$(CRABFORK_CODE_SIGN_STYLE)"
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(CRABFORK_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(CRABFORK_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(CRABFORK_WATCH_EXTENSION_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(CRABFORK_WATCH_EXTENSION_PROFILE)"
    info:
      path: WatchExtension/Info.plist
      properties:
        CFBundleDisplayName: Crabfork
        CFBundleShortVersionString: "$(CRABFORK_MARKETING_VERSION)"
        CFBundleVersion: "$(CRABFORK_BUILD_VERSION)"
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: "$(CRABFORK_WATCH_APP_BUNDLE_ID)"
          NSExtensionPointIdentifier: com.apple.watchkit

  CrabforkTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests
        excludes:
          - Logic
    dependencies:
      - target: Crabfork
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(CRABFORK_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(CRABFORK_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.crabfork.ios.tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Crabfork.app/Crabfork"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: CrabforkTests
        CFBundleShortVersionString: "$(CRABFORK_MARKETING_VERSION)"
        CFBundleVersion: "$(CRABFORK_BUILD_VERSION)"

  CrabforkLogicTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests/Logic
    dependencies:
      - package: CrabforkKit
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(CRABFORK_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(CRABFORK_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.crabfork.ios.logic-tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: CrabforkLogicTests
        CFBundleShortVersionString: "$(CRABFORK_MARKETING_VERSION)"
        CFBundleVersion: "$(CRABFORK_BUILD_VERSION)"
