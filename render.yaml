services:
  - type: web
    name: crabfork
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: CRABFORK_GATEWAY_PORT
        value: "8080"
      - key: CRABFORK_STATE_DIR
        value: /data/.crabfork
      - key: CRABFORK_WORKSPACE_DIR
        value: /data/workspace
      - key: CRABFORK_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: crabfork-data
      mountPath: /data
      sizeGB: 1
